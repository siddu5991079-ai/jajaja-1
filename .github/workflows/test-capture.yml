name: Live Stream Bypass & Record

on:
  workflow_dispatch:

jobs:
  bypass-and-record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg libgbm-dev pulseaudio

      - name: Install Puppeteer & Stealth
        run: |
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Run Bypass & Record Video
        run: |
          # Start Virtual Audio
          pulseaudio --start --exit-idle-time=-1
          
          # 1. Start Virtual Display at 240p (Ultra Light weight)
          Xvfb :99 -screen 0 426x240x24 &
          export DISPLAY=:99
          sleep 3

          # 2. Start Puppeteer Script in Background
          node browser.js &
          
          # 3. Give browser 2 seconds to launch, then start FFmpeg
          sleep 2
          
          # 4. Ultra-Optimized Recording (240p, 15fps)
          echo "Starting 30-second optimized 240p recording..."
          ffmpeg -y -f x11grab -video_size 426x240 -framerate 15 -draw_mouse 0 -i :99 \
          -f pulse -i default \
          -t 30 -c:v libx264 -preset ultrafast -crf 32 -pix_fmt yuv420p \
          -c:a aac -b:a 64k -threads 2 bypass_record.mp4

      - name: Upload Recording Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Stream-Bypass-Video
          path: bypass_record.mp4
          retention-days: 1
















